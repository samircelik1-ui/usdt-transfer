<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - USDT Transfers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-container h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
        }

        .login-container input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .login-container button {
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-container button:hover {
            background: #764ba2;
        }

        .dashboard-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: none;
        }

        .dashboard-container h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            display: none;
        }

        table thead {
            background: #f5f5f5;
        }

        table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #ddd;
        }

        table td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        table tr:hover {
            background: #f9f9f9;
        }

        .address, .hash {
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            color: #666;
        }

        .amount {
            font-weight: 600;
            color: #667eea;
        }

        .timestamp {
            color: #999;
            font-size: 14px;
        }

        #emptyMessage {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 18px;
        }

        #loadingMessage {
            text-align: center;
            color: #667eea;
            padding: 40px;
            font-size: 18px;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container">
        <h1>Dashboard Login</h1>
        <input type="password" id="passwordInput" placeholder="Enter password">
        <button onclick="login()">Login</button>
    </div>

    <div id="dashboardContainer" class="dashboard-container">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <h1>USDT Transfer Transactions</h1>
        <div id="loadingMessage">Loading transactions...</div>
        <div id="emptyMessage">No transactions yet</div>
        <table id="transactionsTable">
            <thead>
                <tr>
                    <th>Wallet Address</th>
                    <th>Transaction Hash</th>
                    <th>Amount</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const PASSWORD = 'Armadio1';

        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === PASSWORD) {
                localStorage.setItem('dashboardAuth', 'true');
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboardContainer').style.display = 'block';
                loadTransactions();
            } else {
                alert('Password incorrect');
            }
        }

        function logout() {
            localStorage.removeItem('dashboardAuth');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboardContainer').style.display = 'none';
            document.getElementById('passwordInput').value = '';
        }

        function checkAuth() {
            if (localStorage.getItem('dashboardAuth') === 'true') {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboardContainer').style.display = 'block';
                loadTransactions();
            }
        }

        async function loadTransactions() {
            try {
                const response = await fetch('https://www.send-usdt.net/api/transactions' );
                const data = await response.json();

                document.getElementById('loadingMessage').style.display = 'none';

                if (data.success && data.transactions && data.transactions.length > 0) {
                    document.getElementById('emptyMessage').style.display = 'none';
                    const table = document.getElementById('transactionsTable');
                    table.style.display = 'table';

                    const tableBody = document.querySelector('#transactionsTable tbody');
                    tableBody.innerHTML = data.transactions.map(tx => `
                        <tr>
                            <td><div class="address">${tx.userAddress}</div></td>
                            <td><div class="hash">${tx.txHash}</div></td>
                            <td><div class="amount">${tx.amount} USDT</div></td>
                            <td><div class="timestamp">${new Date(tx.timestamp).toLocaleString()}</div></td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('emptyMessage').style.display = 'block';
                    document.getElementById('transactionsTable').style.display = 'none';
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('loadingMessage').textContent = 'Error loading transactions';
            }
        }

        // Refresh transactions every 5 seconds
        setInterval(loadTransactions, 5000);

        // Check auth on page load
        checkAuth();
    </script>
</body>
</html>
